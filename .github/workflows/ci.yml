name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'CONTRIBUTORS.svg'
      - 'assets/screenshots/**'
      - 'assets/logo.*'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'CONTRIBUTORS.svg'
      - 'assets/screenshots/**'
      - 'assets/logo.*'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@0f1b44df7e9cbb178d781a242338dfa5e243ad7f # nightly
        with:
          toolchain: nightly
          components: rustfmt

      - name: Run formatter
        run: make fmt

      # Auto-push a "style: auto format" commit so contributors don't have to
      # rerun rustfmt manually. Guards:
      #   - github.actor check skips runs triggered by this same step (no loop).
      #   - push event runs for the maintainer's own pushes.
      #   - PR event only runs for branches inside this repo (forks are read-
      #     only here; their PR will get a failed `Check formatting` step
      #     instead, which the contributor must fix locally).
      # Contributors rebasing on a pushed format commit need to `git pull` —
      # this trade-off is intentional; see CONTRIBUTING.md.
      - name: Commit formatted changes
        if: >
          github.actor != 'github-actions[bot]' &&
          (github.event_name == 'push' ||
           (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: auto format"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Check formatting
        run: make fmt-check

  test:
    name: Unit Tests
    runs-on: macos-latest
    needs: fmt
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-nextest
        uses: taiki-e/install-action@f092c064826410a38929a5791d2c0225b94432fe # nextest

      - name: Run tests
        run: |
          cargo nextest run --locked -E 'not test(shapecache::test::ligatures_jetbrains)'
          cargo nextest run --locked -p wezterm-escape-parser

      - name: Download vendor dependencies
        run: bash scripts/download_vendor.sh

      - name: Shell integration smoke tests
        run: |
          set -euo pipefail
          tests=(
            assets/shell-integration/tests/normalize_kaku_source_line_smoke.sh
            assets/shell-integration/tests/cleanup_legacy_inline_block_smoke.sh
            assets/shell-integration/tests/z_jump_provider_smoke.sh
            assets/shell-integration/tests/yazi_theme_smoke.sh
            assets/shell-integration/tests/starship_rprompt_smoke.sh
            assets/shell-integration/tests/setup_zsh_update_only_smoke.sh
            assets/shell-integration/tests/kiro_autosuggest_compat_smoke.sh
            assets/shell-integration/tests/cmd_backspace_binding_smoke.sh
            assets/shell-integration/tests/fish_ai_query_clear_smoke.sh
            assets/shell-integration/tests/install_cli_tools_mise_smoke.sh
            assets/shell-integration/tests/tmux_integration_smoke.sh
            assets/shell-integration/tests/config_update_highlights_smoke.sh
          )
          for test_script in "${tests[@]}"; do
            echo "::group::Running ${test_script}"
            if ! bash "$test_script"; then
              echo "Smoke test failed: ${test_script}" >&2
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: Shell script lint (shellcheck)
        run: |
          set -euo pipefail
          if ! command -v shellcheck >/dev/null 2>&1; then
            brew install shellcheck
          fi
          # Lint the bundled bash integration scripts. kaku.sh is zsh and
          # state_common.sh is a sourced fragment, so scope to files with a bash
          # shebang (shellcheck cannot parse zsh). --severity=error catches the
          # recurring class such as SC2168 (`local` outside a function, #432/#441)
          # without failing on style nits.
          status=0
          for f in assets/shell-integration/*.sh; do
            if head -1 "$f" | grep -qE '^#!/(bin/bash|usr/bin/env bash)'; then
              echo "::group::shellcheck ${f}"
              shellcheck --severity=error "$f" || status=1
              echo "::endgroup::"
            fi
          done
          exit "$status"

  check:
    name: Cargo Check
    runs-on: macos-latest
    needs: fmt
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Guard silent write flush ok
        run: |
          if grep -R -nE "write!\(.*\)\.ok\(\)|write_all\(.*\)\.ok\(\)|write_fmt\(.*\)\.ok\(\)|\.flush\(\)\.ok\(\)" --include='*.rs' term kaku kaku-gui mux; then
            echo "ERROR: write/flush must not silently ignore errors in core crates"
            exit 1
          fi

      - name: Guard production logging discipline
        run: ./scripts/check_logs.sh

      - name: Guard prompt metadata headers
        run: ./scripts/check_prompts.sh

      - name: Check key crates
        run: cargo check --locked -p kaku -p kaku-gui

  relay-check:
    name: Relay Build
    runs-on: macos-latest
    needs: fmt
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates/kaku-relay

      # kaku-relay is in `workspace.exclude` because it ships to fly.io with
      # its own dependency closure. CI builds and tests it here so the main
      # branch never lands a relay that doesn't compile.
      - name: Check kaku-relay
        run: cargo check --locked --manifest-path crates/kaku-relay/Cargo.toml

      - name: Test kaku-relay
        run: cargo test --locked --manifest-path crates/kaku-relay/Cargo.toml

  clippy:
    name: Clippy
    runs-on: macos-latest
    needs: fmt
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.0
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # Only the crates that opt in via `[lints] workspace = true` in their
      # own Cargo.toml are scoped here. Other crates (vendored, wezterm
      # upstream-tracking, etc.) will be added incrementally.
      - name: Run clippy on lint-opt-in crates
        run: |
          cargo clippy --locked --all-targets \
            -p kaku -p kaku-gui -p mux -p config \
            -- -D warnings

  release-notes-check:
    name: Release Notes Check
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check RELEASE_NOTES.md version
        run: ./scripts/check_release_notes.sh

  config-check:
    name: Config Version Check
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # check_release_config.sh reads previous version tags

      - name: Check bundled config version
        run: ./scripts/check_release_config.sh

  universal-build:
    name: Universal Build Validation
    runs-on: macos-latest
    needs: [check, test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.0
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build both targets
        run: |
          set -o pipefail
          cargo build --locked --release --target aarch64-apple-darwin -p kaku -p kaku-gui 2>&1 | sed '/has no symbols/d'
          cargo build --locked --release --target x86_64-apple-darwin -p kaku -p kaku-gui 2>&1 | sed '/has no symbols/d'

      - name: Lipo merge and verify
        run: |
          mkdir -p target/universal/release
          lipo -create -output target/universal/release/kaku \
            target/aarch64-apple-darwin/release/kaku \
            target/x86_64-apple-darwin/release/kaku
          lipo -create -output target/universal/release/kaku-gui \
            target/aarch64-apple-darwin/release/kaku-gui \
            target/x86_64-apple-darwin/release/kaku-gui

          lipo target/universal/release/kaku -verify_arch arm64 x86_64
          lipo target/universal/release/kaku-gui -verify_arch arm64 x86_64

          lipo -info target/universal/release/kaku
          lipo -info target/universal/release/kaku-gui

  app-bundle:
    name: App Bundle Validation
    runs-on: macos-latest
    needs: [check, test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build debug app bundle
        run: |
          set -o pipefail
          ./scripts/build.sh --native-arch --app-only 2>&1 | sed '/has no symbols/d'

      - name: Verify bundled shell plugins are pinned
        run: |
          test -d dist/Kaku.app
          test "$(cat dist/Kaku.app/Contents/Resources/vendor/zsh-autosuggestions/.kaku-vendor-ref)" = "85919cd1ffa7d2d5412f6d3fe437ebdbeeec4fc5"
          test "$(cat dist/Kaku.app/Contents/Resources/vendor/fast-syntax-highlighting/.kaku-vendor-ref)" = "3d574ccf48804b10dca52625df13da5edae7f553"
          test "$(cat dist/Kaku.app/Contents/Resources/vendor/zsh-completions/.kaku-vendor-ref)" = "84615f3d0b0e943d5b1de862c9552e572c8e70bb"
